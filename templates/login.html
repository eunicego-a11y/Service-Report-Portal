<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Service Log Portal - Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .monday-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        background-color: #0055cc;
        border: 1px solid #0055cc;
        color: white;
        font-weight: 600;
      }
      .monday-btn:hover {
        background-color: #0044aa;
        color: white;
        text-decoration: none;
      }
      .divider {
        display: flex;
        align-items: center;
        margin: 20px 0;
        color: #999;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background-color: #ddd;
      }
      .divider::before {
        margin-right: 10px;
      }
      .divider::after {
        margin-left: 10px;
      }
    </style>
  </head>
  <body
    class="bg-light d-flex align-items-center justify-content-center"
    style="min-height: 100vh"
  >
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="card shadow-lg">
            <div class="card-body p-5">
              <h2 class="card-title text-center mb-4">Service Log Portal</h2>
              <h5 class="card-subtitle text-center text-muted mb-4">
                MC Biotechnical Solutions
              </h5>

              {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %} {% for category, message in messages %}
              <div
                class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show"
              >
                {{ message }}
                <button
                  type="button"
                  class="btn-close"
                  data-bs-dismiss="alert"
                ></button>
              </div>
              {% endfor %} {% endif %} {% endwith %}

              <!-- Monday.com Login Button -->
              <a
                href="{{ url_for('monday_login') }}"
                class="btn btn-primary w-100 btn-lg monday-btn"
              >
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="currentColor"
                >
                  <path
                    d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11z"
                  />
                </svg>
                Sign in with Monday.com
              </a>

              <div class="divider">Or</div>

              <!-- Traditional Login Form -->
              <form action="/login" method="POST">
                <div class="mb-3">
                  <label for="username" class="form-label">Username</label>
                  <input
                    type="text"
                    class="form-control form-control-lg"
                    id="username"
                    name="username"
                    placeholder="Enter username"
                    required
                    autofocus
                  />
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label">Password</label>
                  <input
                    type="password"
                    class="form-control form-control-lg"
                    id="password"
                    name="password"
                    placeholder="Enter password"
                    required
                  />
                </div>
                <button type="submit" class="btn btn-primary w-100 btn-lg">
                  Login
                </button>
              </form>
              <div class="text-center mt-3">
                <a href="{{ url_for('signup') }}"
                  >Don't have an account? Sign Up</a
                >
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
